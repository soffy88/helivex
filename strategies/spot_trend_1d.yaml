strategy: spot_trend
description: "Daily Donchian spot trend — long-only, 200d SMA bear filter (SWAP proxy)"
timeframe: 1D
instruments:
  - BTC-USDT-SWAP    # using SWAP as spot proxy (as in R6.0)
  - ETH-USDT-SWAP
  - SOL-USDT-SWAP
db_table: market_data.ohlcv_1h
db_source: okx_swap_5m
resample_to_1d: true   # resample 5m → 1D (288 5m bars per day)

# Donchian standalone mode
donchian:
  n_enter: 20    # 20-day breakout entry
  n_exit: 10     # 10-day pullback exit

risk:
  cost_bps: 10.0    # use same taker rate for fair comparison
  bear_ma: 200      # 200d SMA bear filter
  max_position_pct: 1.0

# indicators block (all disabled — using donchian mode above)
indicators:
  supertrend:
    enabled: false
  ema:
    enabled: false
  adx:
    enabled: false
  macd:
    enabled: false

signal_logic:
  min_confluence: 1
  direction: long

mode: backtest

gate:
  n_splits: 6
  embargo_bars: 50    # 50 daily bars embargo
  pbo_threshold: 0.5
