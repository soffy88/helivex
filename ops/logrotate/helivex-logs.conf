# Helivex service logs (append-mode systemd StandardOutput files in $HOME).
# Run via the helivex-logrotate.timer (user systemd) since the system logrotate
# does not see user $HOME configs. copytruncate keeps the services' open fds valid.
/home/soffy/helivex_gw.log
/home/soffy/helivex_web.log
/home/soffy/helivex_paper.log
/home/soffy/helivex_l2recorder.log
/home/soffy/helivex_monitor.log
{
    daily
    rotate 7
    size 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
